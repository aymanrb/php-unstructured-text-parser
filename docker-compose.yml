services:
  php-8.1: &php
    build:
      args:
        ALPINE_VERSION: "3.18"
        PHP_VERSION: "8.1"
        PHP_XDEBUG_VERSION: "3.2.1"
    working_dir: /app
    volumes:
      - .:/app
    environment:
      PHP_IDE_CONFIG: serverName=php-text-parser
  php-8.2:
    <<: *php
    build:
      args:
        PHP_VERSION: "8.2"
  php-8.3:
    <<: *php
    build:
      args:
        PHP_VERSION: "8.3"
  php-8.4:
    <<: *php
    build:
      args:
        PHP_VERSION: "8.4"